<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>문의하기 - 켬 스튜디오</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; padding: 24px; line-height: 1.6; background: #f9fafb; }
    .card { max-width: 560px; margin: 0 auto; border: 1px solid #ddd; border-radius: 12px; padding: 24px; background: #fff; }
    h2 { margin: 0 0 6px; }
    .muted { color: #666; font-size: 13px; margin: 0 0 20px; }
    label { display: block; font-size: 12px; color: #444; margin: 0 0 6px; }
    input, select, textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ccc; font-size: 14px; box-sizing: border-box; margin-bottom: 12px; font-family: inherit; }
    textarea { resize: vertical; min-height: 120px; }
    .btn { width: 100%; padding: 13px; font-size: 15px; border: 0; border-radius: 10px; cursor: pointer; }
    .btn-submit { background: #1d4ed8; color: #fff; }
    .btn-submit:disabled { background: #ccc; cursor: not-allowed; }
    .err { color: #991b1b; font-size: 13px; margin-top: 10px; }
    .hr { height: 1px; background: #eee; margin: 20px 0; }
    #loadingMsg { color: #666; font-size: 13px; margin-top: 10px; display: none; }
    #formArea { }
    #doneBox { display: none; text-align: center; padding: 24px 0; }
    .done-icon { font-size: 48px; margin-bottom: 12px; }
    .done-title { font-size: 18px; font-weight: 700; margin: 0 0 8px; }
    .done-desc { font-size: 13px; color: #666; line-height: 1.8; }
  </style>
</head>
<body>
  <div class="card">
    <div id="formArea">
      <h2>문의하기</h2>
      <p class="muted">문의 내용을 남겨주시면 이메일 또는 연락처로 답변드리겠습니다.</p>

      <label>이름</label>
      <input id="name" type="text" placeholder="예: 홍길동" />

      <label>연락처</label>
      <input id="phone" type="tel" placeholder="예: 01012345678" />

      <label>이메일 <span style="color:#999">(선택)</span></label>
      <input id="email" type="email" placeholder="예: example@school.kr" />

      <label>문의 유형</label>
      <select id="inquiryType">
        <option value="">유형을 선택해주세요</option>
        <option value="주문/결제">주문 / 결제</option>
        <option value="배송">배송</option>
        <option value="상품">상품</option>
        <option value="취소/반품">취소 / 반품</option>
        <option value="기타">기타</option>
      </select>

      <label>문의 내용</label>
      <textarea id="content" placeholder="문의하실 내용을 자세히 입력해주세요."></textarea>

      <button class="btn btn-submit" id="submitBtn">문의 접수하기</button>
      <p id="errMsg" class="err"></p>
      <p id="loadingMsg">접수 중입니다. 잠시만 기다려주세요...</p>
    </div>

    <div id="doneBox">
      <div class="done-icon">✅</div>
      <p class="done-title">문의가 접수되었습니다</p>
      <p class="done-desc">
        빠른 시일 내에 답변드리겠습니다.<br>
        추가 문의는 nk@kyeomstudio.com으로 연락해주세요.
      </p>
    </div>
  </div>

  <script>
    const const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyNNN9dRd3EATcAZV6uXx90TtTo4ryIPv-yI1BuXAFGAPfT-OnJR_dsBrc_LcoaeztPlw/exec";APPS_SCRIPT_URL = "여기에_앱스스크립트_URL_입력";

    document.getElementById("submitBtn").addEventListener("click", async () => {
      const name = document.getElementById("name").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const email = document.getElementById("email").value.trim();
      const inquiryType = document.getElementById("inquiryType").value;
      const content = document.getElementById("content").value.trim();
      const errMsg = document.getElementById("errMsg");
      const loadingMsg = document.getElementById("loadingMsg");
      const submitBtn = document.getElementById("submitBtn");

      errMsg.textContent = "";

      if (!name) { errMsg.textContent = "이름을 입력해주세요."; return; }
      if (!phone) { errMsg.textContent = "연락처를 입력해주세요."; return; }
      if (!inquiryType) { errMsg.textContent = "문의 유형을 선택해주세요."; return; }
      if (!content) { errMsg.textContent = "문의 내용을 입력해주세요."; return; }

      submitBtn.disabled = true;
      loadingMsg.style.display = "block";

      const payload = {
        type: "inquiry",
        name,
        phone,
        email,
        inquiryType,
        content,
      };

      try {
        await fetch(APPS_SCRIPT_URL, {
          method: "POST",
          body: JSON.stringify(payload),
        });

        loadingMsg.style.display = "none";
        document.getElementById("formArea").style.display = "none";
        document.getElementById("doneBox").style.display = "block";
      } catch (e) {
        loadingMsg.style.display = "none";
        submitBtn.disabled = false;
        errMsg.textContent = "접수 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.";
      }
    });
  </script>
</body>
</html>
